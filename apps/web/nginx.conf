server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Hauptroute (Single Page Application Fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy-Pass für die API (Backend-Service)
    # Leitet alle Anfragen an /api/ an den Backend-Container weiter
    location /api/ {
        proxy_set_header Host $host;
        # WICHTIG: 'backend' ist der Service-Name in docker-compose.yml
        proxy_pass http://backend:3001/; 
    }
}
