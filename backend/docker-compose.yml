version: '3.8'
services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=psynexus
      - POSTGRES_USER=psynexus
      - POSTGRES_PASSWORD=changeme_secure_password_here
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src
    restart: unless-stopped
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=psynexus
      - POSTGRES_USER=psynexus
      - POSTGRES_PASSWORD=changeme_secure_password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
volumes:
  postgres_data:
