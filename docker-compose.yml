version: '3.8'
services:
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: psy-nexus-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:5000
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psy-nexus-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://psyuser:password@postgres:5432/psy_nexus
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-prod
      - SESSION_SECRET=your-super-secret-session-key-change-in-prod
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    container_name: psy-nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: psy_nexus
      POSTGRES_USER: psyuser
      POSTGRES_PASSWORD: password
    volumes:
      - psy-nexus-db-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432" # Nur für Debugging, in Produktion entfernen
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psyuser -d psy_nexus"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: psy-nexus-redis
    restart: unless-stopped
    volumes:
      - psy-nexus-redis-data:/data
    ports:
      - "6379:6379" # Nur für Debugging, in Produktion entfernen
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: psy-nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf
      - ./infrastructure/nginx/security.conf:/etc/nginx/conf.d/security.conf
      - ./infrastructure/nginx/gzip.conf:/etc/nginx/conf.d/gzip.conf
      # Stelle sicher, dass der Pfad zu deinen statischen Frontend-Dateien korrekt ist, wenn du sie direkt bereitstellst
      # - ./apps/web/dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  psy-nexus-db-
  psy-nexus-redis-

networks:
  app-network:
    driver: bridge
