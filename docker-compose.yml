services:
  # --- Frontend Service (Nginx mit gebauter App) ---
  frontend:
    build:
      # Build-Kontext ist der apps/web Ordner (wo die package.json liegt)
      context: ./apps/web
      # Das Dockerfile liegt direkt in diesem Ordner
      dockerfile: Dockerfile
    container_name: psy-nexus-frontend
    restart: unless-stopped
    ports:
      # Exponiert Port 80 des Nginx-Containers nach außen auf Port 3000
      - "8080:80" 
    depends_on:
      - backend
    environment:
      # URL zur Kommunikation mit dem Backend im Docker-Netzwerk
      - VITE_API_URL=http://backend:5000
    networks:
      - app-network

  # --- Backend Service (Node.js API) ---
  backend:
    build:
      # Build-Kontext: Root-Verzeichnis (um alle Quell-Dateien zu erfassen)
      context: .
      # Das Dockerfile liegt in backend/Dockerfile
      dockerfile: backend/Dockerfile
    container_name: psy-nexus-backend
    restart: unless-stopped
    ports:
      # Exponiert Port 5000 des Node.js-Containers nach außen
      - "5000:5000"
    # Korrigiert den Entry-Point von 'server.js' auf das korrekte 'index.js'
    command: node backend/dist/index.js 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://psyuser:password@postgres:5432/psy_nexus
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-prod
      - SESSION_SECRET=your-super-secret-session-key-change-in-prod
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    networks:
      - app-network

  # --- Datenbank Service (PostgreSQL) ---
  postgres:
    image: postgres:15-alpine
    container_name: psy-nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: psy_nexus
      POSTGRES_USER: psyuser
      POSTGRES_PASSWORD: password
    volumes:
      - psy-nexus-db-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psyuser -d psy_nexus"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app-network

  # --- Caching/Session Service (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: psy-nexus-redis
    restart: unless-stopped
    volumes:
      - psy-nexus-redis-data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

volumes:
  psy-nexus-db-data:
  psy-nexus-redis-data:

networks:
  app-network:
    driver: bridge
