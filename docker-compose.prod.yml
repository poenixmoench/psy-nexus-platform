version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: psy-nexus-db
    environment:
      POSTGRES_DB: psy_nexus
      POSTGRES_USER: psynexus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psynexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - psy-nexus-network

  # Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: psy-nexus-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: psy_nexus
      DB_USER: psynexus
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OLLAMA_URL: http://ollama:11434
      CORS_ORIGINS: https://psy-nexus.com,https://www.psy-nexus.com
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - psy-nexus-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama (Qwen 14B)
  ollama:
    image: ollama/ollama:latest
    container_name: psy-nexus-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - psy-nexus-network
    restart: always

  # Frontend (Nginx)
  nginx:
    image: nginx:alpine
    container_name: psy-nexus-web
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - psy-nexus-network
    restart: always

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local

networks:
  psy-nexus-network:
    driver: bridge
