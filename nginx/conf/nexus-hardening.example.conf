# Beispiel: Zusätzliche Hardening- und Streaming-Settings für PSY-NEXUS
# Diese Datei ist NICHT automatisch aktiviert.
# Manuell in /etc/nginx/nginx.conf oder /etc/nginx/conf.d/ einbinden und testen.

# HTTP-spezifische Security-Header
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;

# Beispiel-Location für Event-Streaming der API
# Achtung: Upstream/Proxy-Ziel an deine bestehende Konfiguration anpassen.
location /api/ {
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;

    # Für Server-Sent Events / Streaming wichtig:
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;

    # Optional: CORS / weitere Header anpassen, falls nötig.
}
